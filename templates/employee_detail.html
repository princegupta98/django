{% block content %}

<div class="row justify-content-center">
	<div class="col-md-6 col-lg-4 mt-4">
		<div class="card shadow-md border mt-6 ">
			<div class="text-center p-3"> <img src="{{ employee.photo.url }}" class="img-fluid rounded-circle border"
					style="width:150px;height:150px;object-fit:cover;" alt="Photo"> </div>
			<div class="card-body text-center">
				<h4 class="card-title mb-1"> {{ employee.f_name }} {{ employee.l_name }} </h4>
				<p class="text-muted mb-3"> {{ employee.designation }} </p>
				<div class="text-start">
					<p class="mb-2"> <strong>Email:</strong><br> {{ employee.email_address }} </p>
					<p class="mb-3"> <strong>Phone:</strong><br> {{ employee.phone_number }} </p>
				</div> <a href="{% url 'employee_list' %}" class="btn btn-primary w-100"> Back to Employees </a>
			</div>
		</div>
	</div>
</div>
{% endblock content %}
